<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Backdraft · Pedidos</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hero">
    <div class="brand-mark" aria-hidden="true">
      <span class="flame">🔥</span>
      <span class="cube">3D</span>
    </div>
    <div class="hero-text">
      <p class="eyebrow">3D Backdraft</p>
      <h1>Pedidos</h1>
      <p class="subtitle">Organizador simple para producción, entrega y pagos.</p>
    </div>
    <button id="syncBtn" class="icon-btn" title="Actualizar">↻</button>
  </header>

  <main>
    <section class="actions">
      <button id="newOrderBtn" class="primary">+ Nuevo pedido</button>
      <input id="searchInput" type="search" placeholder="Buscar pedido, cliente o nota..." />
    </section>

    <nav class="tabs" aria-label="Estados de pedidos">
      <button class="tab active" data-filter="Para hacer"><span>🖨️</span> Para hacer</button>
      <button class="tab" data-filter="Hecho"><span>🚗</span> Para entregar</button>
      <button class="tab" data-filter="Espera de pago"><span>💵</span> Espera pago</button>
      <button class="tab" data-filter="Deudor"><span>⚠️</span> Deudores</button>
      <button class="tab" data-filter="Todos"><span>📋</span> Todos</button>
    </nav>

    <section id="statusMsg" class="status-msg"></section>
    <section id="ordersList" class="orders-list"></section>

    <section class="summary-wrap" aria-label="Resumen de pedidos">
      <h2>Recuento general</h2>
      <section class="summary" id="summary"></section>
    </section>
  </main>

  <dialog id="orderDialog">
    <form id="orderForm" method="dialog" class="form-card">
      <div class="dialog-head">
        <div>
          <p class="eyebrow mini">Carga rápida</p>
          <h2 id="dialogTitle">Nuevo pedido</h2>
        </div>
        <button type="button" id="closeDialogBtn" class="ghost">×</button>
      </div>

      <input type="hidden" id="orderId" />

      <label>
        Pedido *
        <textarea id="pedido" rows="3" placeholder="Ej: 10 llaveros bomberos + nombres" required></textarea>
      </label>

      <label>
        Cliente / Para
        <input id="cliente" type="text" placeholder="Opcional" />
      </label>

      <div class="grid-2">
        <label>
          Precio
          <input id="precio" type="number" min="0" step="1" placeholder="Opcional" />
        </label>

        <label>
          Seña / pagado
          <input id="sena" type="number" min="0" step="1" placeholder="Opcional" />
        </label>
      </div>

      <label>
        Fecha compromiso
        <input id="fechaCompromiso" type="date" />
      </label>

      <label>
        Estado
        <select id="estado">
          <option>Para hacer</option>
          <option>Hecho</option>
          <option>Entregado</option>
          <option>Espera de pago</option>
          <option>Deudor</option>
        </select>
      </label>

      <label>
        Nota
        <textarea id="nota" rows="2" placeholder="Color, entrega, medidas, link de referencia, etc."></textarea>
      </label>

      <button class="primary full" type="submit">Guardar pedido</button>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
